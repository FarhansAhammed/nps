<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spatial Art Gallery</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Custom Font */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }

        /* Glassmorphism Utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        .glass-button {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }

        .glass-button:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }

        /* Active Card Bottom Info Glass */
        .glass-card-info {
            background: linear-gradient(to bottom, rgba(20, 20, 20, 0.3) 0%, rgba(10, 10, 10, 0.7) 100%);
            backdrop-filter: blur(20px) saturate(120%);
            -webkit-backdrop-filter: blur(20px) saturate(120%);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* 3D Container Settings */
        .perspective-container {
            perspective: 1200px;
            transform-style: preserve-3d;
        }

        /* Gallery Card Base Styles */
        .gallery-card {
            position: absolute;
            transition: all 0.7s cubic-bezier(0.25, 0.8, 0.25, 1);
            /* Smooth spring-like transition */
            transform-origin: center center;
            will-change: transform, opacity;
        }

        /* Dynamic Classes applied via JS for positioning - BENDING INWARDS */
        .card-active {
            z-index: 10;
            transform: translateX(0) translateZ(50px) rotateY(0deg) scale(1);
            opacity: 1;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.2);
        }

        .card-left-1 {
            z-index: 5;
            transform: translateX(-60%) translateZ(-100px) rotateY(-25deg) scale(0.85);
            /* Negative rotation bends inward */
            opacity: 0.85;
            cursor: pointer;
        }

        .card-right-1 {
            z-index: 5;
            transform: translateX(60%) translateZ(-100px) rotateY(25deg) scale(0.85);
            /* Positive rotation bends inward */
            opacity: 0.85;
            cursor: pointer;
        }

        .card-left-2 {
            z-index: 2;
            transform: translateX(-105%) translateZ(-250px) rotateY(-35deg) scale(0.7);
            opacity: 0.5;
            cursor: pointer;
        }

        .card-right-2 {
            z-index: 2;
            transform: translateX(105%) translateZ(-250px) rotateY(35deg) scale(0.7);
            opacity: 0.5;
            cursor: pointer;
        }

        .card-hidden-left {
            transform: translateX(-130%) translateZ(-400px) rotateY(-45deg) scale(0.5);
            opacity: 0;
            z-index: 0;
            pointer-events: none;
        }

        .card-hidden-right {
            transform: translateX(130%) translateZ(-400px) rotateY(45deg) scale(0.5);
            opacity: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* Hide details on inactive cards */
        .gallery-card:not(.card-active) .card-details {
            opacity: 0;
            pointer-events: none;
        }

        /* Dimming overlay for inactive cards */
        .card-dim-overlay {
            transition: opacity 0.7s ease;
            opacity: 0;
        }

        .gallery-card:not(.card-active) .card-dim-overlay {
            opacity: 0.3;
        }

        /* Hide scrollbar */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body class="text-white antialiased relative w-full h-screen">

    <!-- Background Environment (Blurred Museum) -->
    <div class="absolute inset-0 z-0">
        <!-- High-res museum interior image -->
        <div
            class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1582555172866-f73bb12a2ab3?q=80&w=2500&auto=format&fit=crop')] bg-cover bg-center opacity-70 transform scale-105 filter blur-sm">
        </div>
        <!-- Gradient overlay to improve contrast -->
        <div class="absolute inset-0 bg-gradient-to-b from-black/20 via-black/10 to-black/60"></div>
    </div>

    <!-- Main Spatial Interface Layer -->
    <div class="relative z-10 w-full h-full flex flex-col items-center">

        <!-- Top Navigation Bar -->
        <nav
            class="glass-panel mt-6 px-4 py-3 rounded-full flex items-center gap-4 w-[90%] max-w-4xl justify-between animate-fade-in-down">
            <div class="flex gap-2">
                <button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-white/10 transition"><i
                        data-lucide="layout-template" class="w-5 h-5 text-white/80"></i></button>
                <button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-white/10 transition"><i
                        data-lucide="chevron-left" class="w-5 h-5 text-white/80"></i></button>
                <button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-white/10 transition"><i
                        data-lucide="chevron-right" class="w-5 h-5 text-white/80"></i></button>
            </div>

            <div class="flex-1 flex justify-center">
                <div
                    class="bg-white/5 border border-white/10 rounded-full px-6 py-2 flex items-center gap-3 w-full max-w-md">
                    <i data-lucide="type" class="w-4 h-4 text-white/50"></i>
                    <span
                        class="text-sm font-medium text-white/90 w-full text-center tracking-wide">ArtMuseum.com</span>
                    <i data-lucide="mic" class="w-4 h-4 text-white/50 cursor-pointer hover:text-white"></i>
                </div>
            </div>

            <div class="flex gap-2">
                <button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-white/10 transition"><i
                        data-lucide="plus" class="w-5 h-5 text-white/80"></i></button>
                <button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-white/10 transition"><i
                        data-lucide="share" class="w-5 h-5 text-white/80"></i></button>
                <button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-white/10 transition"><i
                        data-lucide="copy" class="w-5 h-5 text-white/80"></i></button>
            </div>
        </nav>

        <!-- Left Action Menu -->
        <aside class="absolute left-6 top-1/2 -translate-y-1/2 glass-panel rounded-full p-2 flex flex-col gap-2">
            <button class="w-12 h-12 rounded-full flex items-center justify-center hover:bg-white/10 transition group">
                <i data-lucide="pen" class="w-5 h-5 text-white/70 group-hover:text-white"></i>
            </button>
            <button class="w-12 h-12 rounded-full flex items-center justify-center hover:bg-white/10 transition group">
                <i data-lucide="heart" class="w-5 h-5 text-white/70 group-hover:text-white"></i>
            </button>
            <button class="w-12 h-12 rounded-full flex items-center justify-center hover:bg-white/10 transition group">
                <i data-lucide="user" class="w-5 h-5 text-white/70 group-hover:text-white"></i>
            </button>
        </aside>

        <!-- Main 3D Gallery Carousel -->
        <main class="flex-1 w-full flex items-center justify-center perspective-container overflow-visible">
            <div id="gallery-container"
                class="relative w-full max-w-[420px] h-[520px] flex items-center justify-center">
                <!-- Cards will be injected here by JavaScript -->
            </div>
        </main>

        <!-- Bottom Artist Profile/Controls -->
        <footer class="glass-panel mb-8 px-6 py-3 rounded-full flex items-center gap-6 shadow-2xl">
            <button id="prev-btn"
                class="w-8 h-8 rounded-full flex items-center justify-center bg-white/5 hover:bg-white/20 transition">
                <i data-lucide="chevron-left" class="w-5 h-5"></i>
            </button>

            <div id="artist-info" class="flex items-center gap-4 transition-opacity duration-300">
                <img src="https://images.unsplash.com/photo-1580136579312-94651dfd596d?q=80&w=200&auto=format&fit=crop"
                    alt="Artist" class="w-12 h-12 rounded-full object-cover border border-white/20">
                <div class="flex flex-col">
                    <span class="text-sm font-semibold tracking-wide">Vincent van Gogh</span>
                    <span class="text-[10px] text-white/60">1853–1890 Zundert, Netherlands</span>
                </div>
                <button class="w-8 h-8 ml-2 rounded-full flex items-center justify-center hover:bg-white/10 transition">
                    <i data-lucide="search" class="w-4 h-4 text-white/70"></i>
                </button>
            </div>

            <button id="next-btn"
                class="w-8 h-8 rounded-full flex items-center justify-center bg-white/5 hover:bg-white/20 transition">
                <i data-lucide="chevron-right" class="w-5 h-5"></i>
            </button>
        </footer>

        <!-- Bottom Pagination Indicator -->
        <div class="absolute bottom-3 flex gap-2">
            <div class="w-4 h-1 bg-white/30 rounded-full"></div>
            <div class="w-8 h-1 bg-white rounded-full"></div> <!-- Active indicator -->
            <div class="w-4 h-1 bg-white/30 rounded-full"></div>
        </div>

    </div>

    <!-- Application Logic -->
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Gallery Data (Added 5 more images)
        const galleryData = [
            {
                id: 1,
                title: "Water Lilies",
                artist: "Claude Monet",
                date: "1919",
                quote: "I must have flowers, always, and always.",
                medium: "Oil on canvas",
                dimensions: "101 x 200 cm",
                image: "https://images.unsplash.com/photo-1549887552-cb1071d3e5ca?q=80&w=1200&auto=format&fit=crop"
            },
            {
                id: 2,
                title: "The Starry Night",
                artist: "Vincent van Gogh",
                date: "June 1889",
                quote: "I look at the stars and with all my being feel that I am a part of one of these stars.",
                medium: "Oil on canvas",
                dimensions: "29 x 36 1/4 in.",
                image: "https://images.unsplash.com/photo-1578301978693-85fa9c03fa75?q=80&w=1200&auto=format&fit=crop"
            },
            {
                id: 3,
                title: "Cafe Terrace at Night",
                artist: "Vincent van Gogh",
                date: "1888",
                quote: "I often think that the night is more alive and more richly colored than the day.",
                medium: "Oil on canvas",
                dimensions: "31.8 x 25.7 in.",
                image: "https://images.unsplash.com/photo-1580136608260-4eb11f4b24fe?q=80&w=1200&auto=format&fit=crop"
            },
            {
                id: 4,
                title: "Girl with a Pearl Earring",
                artist: "Johannes Vermeer",
                date: "1665",
                quote: "A masterpiece of light and shadow.",
                medium: "Oil on canvas",
                dimensions: "17.5 x 15 in.",
                image: "https://images.unsplash.com/photo-1543857778-c4a1a3e0b2eb?q=80&w=1200&auto=format&fit=crop"
            },
            {
                id: 5,
                title: "The Kiss",
                artist: "Gustav Klimt",
                date: "1907-1908",
                quote: "Art is a line around your thoughts.",
                medium: "Oil and gold leaf on canvas",
                dimensions: "180 x 180 cm",
                image: "https://images.unsplash.com/photo-1605806616949-1e87b487cb2a?q=80&w=1200&auto=format&fit=crop"
            },
            {
                id: 6,
                title: "The Great Wave",
                artist: "Katsushika Hokusai",
                date: "1831",
                quote: "A timeless symbol of nature's power.",
                medium: "Woodblock print",
                dimensions: "10.1 x 14.9 in.",
                image: "https://images.unsplash.com/photo-1614524451016-5688d6df1d38?q=80&w=1200&auto=format&fit=crop"
            },
            {
                id: 7,
                title: "Abstract Harmony",
                artist: "Wassily Kandinsky",
                date: "1923",
                quote: "Color is a power which directly influences the soul.",
                medium: "Oil on canvas",
                dimensions: "150 x 200 cm",
                image: "https://images.unsplash.com/photo-1541961017774-22349e4a1262?q=80&w=1200&auto=format&fit=crop"
            },
            {
                id: 8,
                title: "Modern Contours",
                artist: "Piet Mondrian",
                date: "1930",
                quote: "The position of the artist is humble. He is essentially a channel.",
                medium: "Oil on canvas",
                dimensions: "46 x 46 cm",
                image: "https://images.unsplash.com/photo-1550684376-efcbd6e3f031?q=80&w=1200&auto=format&fit=crop"
            },
            {
                id: 9,
                title: "Sculpted Light",
                artist: "Auguste Rodin",
                date: "1902",
                quote: "Nothing is a waste of time if you use the experience wisely.",
                medium: "Bronze",
                dimensions: "72 in.",
                image: "https://images.unsplash.com/photo-1548810237-7756f1ea124e?q=80&w=1200&auto=format&fit=crop"
            },
            {
                id: 10,
                title: "Renaissance Echo",
                artist: "Sandro Botticelli",
                date: "1485",
                quote: "A rebirth of classical beauty and proportion.",
                medium: "Tempera on canvas",
                dimensions: "172.5 x 278.5 cm",
                image: "https://images.unsplash.com/photo-1576014131341-cecb79519d08?q=80&w=1200&auto=format&fit=crop"
            }
        ];

        // --- NEW: Shuffle the array to randomize images on load ---
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // Randomize the images before creating the gallery
        shuffleArray(galleryData);

        let currentIndex = 0; // Always start at 0 since the array is already randomized
        const container = document.getElementById('gallery-container');
        let autoSlideInterval;

        // Function to start or reset the auto-slide timer
        function startAutoSlide() {
            clearInterval(autoSlideInterval);
            autoSlideInterval = setInterval(() => {
                // Loop sequentially to maintain the visual "circle" transition
                if (currentIndex < galleryData.length - 1) {
                    currentIndex++;
                } else {
                    currentIndex = 0; // Wrap around to the start
                }
                updateGallery();
            }, 3000); // 3 seconds
        }

        // Function to create DOM elements for cards
        function createGallery() {
            galleryData.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = `gallery-card w-[380px] h-[500px] rounded-[36px] overflow-hidden shadow-2xl`;
                card.dataset.index = index;

                // Add click listener to side cards to make them active
                card.addEventListener('click', () => {
                    if (currentIndex !== index) {
                        currentIndex = index;
                        updateGallery();
                        startAutoSlide(); // Reset timer if user manually interacts
                    }
                });

                card.innerHTML = `
                    <!-- Background Image -->
                    <img src="${item.image}" alt="${item.title}" class="absolute inset-0 w-full h-full object-cover" />
                    <div class="card-dim-overlay absolute inset-0 bg-black"></div>

                    <!-- Details Content (Only visible on active card) -->
                    <div class="card-details absolute inset-0 flex flex-col justify-between transition-opacity duration-500">
                        <!-- Top Action Buttons -->
                        <div class="flex justify-between items-center p-5 z-20">
                            <button class="glass-button w-10 h-10 rounded-full flex items-center justify-center">
                                <i data-lucide="chevron-left" class="w-5 h-5 text-white"></i>
                            </button>
                            <button class="expand-btn glass-button px-5 h-10 rounded-full flex items-center justify-center gap-2 font-medium text-sm transition-transform hover:scale-105 active:scale-95">
                                <i data-lucide="maximize-2" class="w-4 h-4 text-white"></i> Expand
                            </button>
                            <button class="glass-button w-10 h-10 rounded-full flex items-center justify-center">
                                <i data-lucide="more-horizontal" class="w-5 h-5 text-white"></i>
                            </button>
                        </div>

                        <!-- Bottom Glass Information Panel -->
                        <div class="glass-card-info p-7 pb-8 rounded-b-[36px] flex flex-col justify-end h-[45%]">
                            <div class="flex justify-between items-end mb-3">
                                <h2 class="text-2xl font-medium tracking-tight leading-none">${item.title}</h2>
                                <span class="text-xs text-white/60 font-medium">${item.date}</span>
                            </div>
                            <p class="text-[15px] leading-snug font-light text-white/90 mb-4 pr-4">
                                "${item.quote}"
                            </p>
                            <div class="flex flex-col gap-1">
                                <p class="text-[11px] text-white/50 tracking-wider uppercase font-medium">Medium: <span class="text-white/80 normal-case tracking-normal">${item.medium}</span></p>
                                <p class="text-[11px] text-white/50 tracking-wider uppercase font-medium">Dimensions: <span class="text-white/80 normal-case tracking-normal">${item.dimensions}</span></p>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);

                // Add event listener for Expand Button
                const expandBtn = card.querySelector('.expand-btn');
                expandBtn.addEventListener('click', (e) => {
                    e.stopPropagation(); // prevent triggering the card click
                    openLightbox(item.image, item.title);
                });
            });

            // Re-initialize icons inside newly created cards
            lucide.createIcons();
            updateGallery();
        }

        // Function to update card classes based on currentIndex
        function updateGallery() {
            const cards = document.querySelectorAll('.gallery-card');

            cards.forEach((card, index) => {
                const offset = index - currentIndex;

                // Remove all positional classes first
                card.classList.remove('card-active', 'card-left-1', 'card-right-1', 'card-left-2', 'card-right-2', 'card-hidden-left', 'card-hidden-right');

                // Apply new class based on distance from active index
                if (offset === 0) {
                    card.classList.add('card-active');
                } else if (offset === -1) {
                    card.classList.add('card-left-1');
                } else if (offset === 1) {
                    card.classList.add('card-right-1');
                } else if (offset === -2) {
                    card.classList.add('card-left-2');
                } else if (offset === 2) {
                    card.classList.add('card-right-2');
                } else if (offset < -2) {
                    card.classList.add('card-hidden-left');
                } else if (offset > 2) {
                    card.classList.add('card-hidden-right');
                }
            });
        }

        // Controls
        document.getElementById('prev-btn').addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
            } else {
                currentIndex = galleryData.length - 1; // Wrap around
            }
            updateGallery();
            startAutoSlide(); // Reset timer
        });

        document.getElementById('next-btn').addEventListener('click', () => {
            if (currentIndex < galleryData.length - 1) {
                currentIndex++;
            } else {
                currentIndex = 0; // Wrap around
            }
            updateGallery();
            startAutoSlide(); // Reset timer
        });

        // --- NEW: Lightbox Logic ---
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeLightboxBtn = document.getElementById('close-lightbox');

        function openLightbox(imgSrc, title) {
            lightboxImg.src = imgSrc;
            lightboxImg.alt = title;
            // Show lightbox
            lightbox.classList.remove('opacity-0', 'pointer-events-none');
            // Subtle zoom-in effect
            setTimeout(() => {
                lightboxImg.classList.remove('scale-95');
                lightboxImg.classList.add('scale-100');
            }, 10);

            // Pause the auto-slider while viewing
            clearInterval(autoSlideInterval);
        }

        function closeLightbox() {
            lightbox.classList.add('opacity-0', 'pointer-events-none');
            lightboxImg.classList.remove('scale-100');
            lightboxImg.classList.add('scale-95');

            // Resume the auto-slider
            startAutoSlide();
        }

        closeLightboxBtn.addEventListener('click', closeLightbox);

        // Close when clicking the dark background overlay
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                closeLightbox();
            }
        });

        // Initialize the app and start automatic slideshow
        createGallery();
        startAutoSlide();

    </script>

    <!-- Fullscreen Lightbox Overlay -->
    <div id="lightbox"
        class="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-xl opacity-0 pointer-events-none transition-opacity duration-500">
        <button id="close-lightbox"
            class="absolute top-6 right-6 w-12 h-12 rounded-full glass-button flex items-center justify-center z-[110] hover:bg-white/20 transition-all cursor-pointer">
            <i data-lucide="x" class="w-6 h-6 text-white"></i>
        </button>
        <img id="lightbox-img" src="" alt="Expanded Artwork"
            class="max-w-[95vw] max-h-[90vh] object-contain rounded-2xl shadow-2xl scale-95 transition-transform duration-500">
    </div>
</body>

</html>
